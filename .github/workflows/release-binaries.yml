name: Release binaries

# Tagsmith owns CHANGELOG.md and GitHub Release creation locally. This workflow
# runs after Tagsmith publishes the release and attaches compiled binaries to it.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to backfill, for example v0.4.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build and upload binaries
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}

      - name: Validate release tag source branch
        run: |
          git fetch origin "${DEFAULT_BRANCH}" --tags
          tag_commit="$(git rev-list -n 1 "${TAG_NAME}")"
          git merge-base --is-ancestor "${tag_commit}" "origin/${DEFAULT_BRANCH}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test -race ./...

      - name: Build binaries
        run: |
          GOOS=linux   GOARCH=amd64 go build -o dist/goconcurrencylint-linux-amd64   ./cmd/goconcurrencylint
          GOOS=linux   GOARCH=arm64 go build -o dist/goconcurrencylint-linux-arm64   ./cmd/goconcurrencylint
          GOOS=darwin  GOARCH=amd64 go build -o dist/goconcurrencylint-darwin-amd64  ./cmd/goconcurrencylint
          GOOS=darwin  GOARCH=arm64 go build -o dist/goconcurrencylint-darwin-arm64  ./cmd/goconcurrencylint
          GOOS=windows GOARCH=amd64 go build -o dist/goconcurrencylint-windows-amd64.exe ./cmd/goconcurrencylint

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${TAG_NAME}" dist/* --clobber
