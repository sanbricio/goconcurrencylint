name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ github.ref_name }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate tag source branch
        run: |
          git fetch origin "${DEFAULT_BRANCH}"
          git merge-base --is-ancestor "${GITHUB_SHA}" "origin/${DEFAULT_BRANCH}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test -race ./...

      - name: Build binaries
        run: |
          GOOS=linux   GOARCH=amd64 go build -o dist/goconcurrencylint-linux-amd64   ./cmd/goconcurrencylint
          GOOS=linux   GOARCH=arm64 go build -o dist/goconcurrencylint-linux-arm64   ./cmd/goconcurrencylint
          GOOS=darwin  GOARCH=amd64 go build -o dist/goconcurrencylint-darwin-amd64  ./cmd/goconcurrencylint
          GOOS=darwin  GOARCH=arm64 go build -o dist/goconcurrencylint-darwin-arm64  ./cmd/goconcurrencylint
          GOOS=windows GOARCH=amd64 go build -o dist/goconcurrencylint-windows-amd64.exe ./cmd/goconcurrencylint

      - name: Generate release notes
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs')
            const { data } = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.TAG_NAME,
              target_commitish: process.env.DEFAULT_BRANCH,
            })
            fs.writeFileSync('release_notes.md', `${data.body.trim()}\n`)

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: release_notes.md

      - name: Switch to default branch for changelog update
        run: git switch -C "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"

      - name: Update changelog
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs')
            const version = process.env.TAG_NAME
            const date = new Date().toISOString().slice(0, 10)
            const path = 'CHANGELOG.md'
            const header = '# Changelog\n\nAll notable changes to this project will be documented in this file.\n\n'
            const notes = fs.readFileSync('release_notes.md', 'utf8').trim()
            const section = `## ${version} - ${date}\n\n${notes}\n\n`

            let content = fs.existsSync(path) ? fs.readFileSync(path, 'utf8') : ''
            let body = ''

            if (content.startsWith(header)) {
              body = content.slice(header.length)
            } else if (content.startsWith('# Changelog')) {
              const parts = content.split('\n\n')
              body = parts.slice(2).join('\n\n').trimStart()
            } else {
              body = content.trimStart()
            }

            const escapedVersion = version.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
            const entryPattern = new RegExp(`^## ${escapedVersion}\\b[\\s\\S]*?(?=^## |\\Z)`, 'm')

            if (entryPattern.test(body)) {
              body = body.replace(entryPattern, section.trimEnd())
            } else {
              body = section + body
            }

            fs.writeFileSync(path, `${header}${body.trimStart()}`)

      - name: Commit changelog
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            exit 0
          fi

          git config user.name "Santiago Bricio Rojas"
          git config user.email "sanbriciorojas11@gmail.com"
          git add CHANGELOG.md
          git commit -m "docs(changelog): update for ${TAG_NAME}"
          git push origin "HEAD:${DEFAULT_BRANCH}"
