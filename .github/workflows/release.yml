name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test -race ./...

      - name: Build binaries
        run: |
          GOOS=linux   GOARCH=amd64 go build -o dist/goconcurrencylint-linux-amd64   ./cmd
          GOOS=linux   GOARCH=arm64 go build -o dist/goconcurrencylint-linux-arm64   ./cmd
          GOOS=darwin  GOARCH=amd64 go build -o dist/goconcurrencylint-darwin-amd64  ./cmd
          GOOS=darwin  GOARCH=arm64 go build -o dist/goconcurrencylint-darwin-arm64  ./cmd
          GOOS=windows GOARCH=amd64 go build -o dist/goconcurrencylint-windows-amd64.exe ./cmd

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
